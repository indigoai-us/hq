name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUN_E2E: "true"
      ANTHROPIC_MODEL: claude-haiku-4-5-20251001
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Run e2e tests
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee e2e-output.txt
      - name: Add cost report to summary
        if: always()
        run: |
          echo '## E2E Cost Report' >> "$GITHUB_STEP_SUMMARY"
          if grep -q 'Cost:' e2e-output.txt 2>/dev/null; then
            grep 'Cost:' e2e-output.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No cost data found in test output.' >> "$GITHUB_STEP_SUMMARY"
          fi
