name: Test create-hq
on:
  push:
    paths:
      - 'packages/create-hq/**'
  pull_request:
    paths:
      - 'packages/create-hq/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # --ignore-scripts prevents npm ascending to the workspace root and
      # running its prepare script (husky), which isn't installed in the child.
      - run: npm install --ignore-scripts
        working-directory: packages/create-hq
      - run: npm test
        working-directory: packages/create-hq
        env:
          GH_TOKEN: ${{ github.token }}
