name: Publish to npm
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm 11.5+ is required for trusted-publisher OIDC token exchange.
      # node 22 ships npm 10.9.x which signs sigstore provenance (via OIDC)
      # but can't swap the OIDC token for a short-lived publish token, so
      # the PUT goes out unauthed and npm returns a masked 404. Pinning
      # npm@11 here makes the full trusted-publisher flow work.
      - run: npm install -g npm@latest
      - run: node --version && npm --version

      # Scope install to publishable workspaces only. `apps/*` workspaces
      # (docs, teams-docs, web) are private and not needed for publishing;
      # their postinstall scripts (pagefind binary fetch) can fail in CI
      # and have no bearing on whether @indigoai-us/hq-cloud ships.
      - run: |
          npm ci \
            --include-workspace-root \
            --workspace packages/hq-cloud \
            --workspace packages/hq-onboarding \
            --workspace packages/hq-cli \
            --workspace packages/hq-agent \
            --workspace packages/godclaw \
            --workspace packages/create-hq

      # Build in dependency order. hq-cloud and hq-onboarding must exist
      # on disk before hq-cli (which imports from both) compiles. npm
      # workspaces does not topo-sort, so we stage explicitly.
      - run: npm run build --workspace packages/hq-cloud --if-present
      - run: npm run build --workspace packages/hq-onboarding --if-present
      - run: npm run build --workspace packages/hq-cli --if-present
      - run: npm run build --workspace packages/hq-agent --if-present
      - run: npm run build --workspace packages/godclaw --if-present
      - run: npm run build --workspace packages/create-hq --if-present

      # All three publish steps use npm trusted publishing (OIDC). No
      # NODE_AUTH_TOKEN — auth is short-lived, minted from the GitHub OIDC
      # identity token at runtime, and scoped to this workflow file by each
      # package's trusted-publisher config on npmjs.com. `--provenance`
      # generates a signed SLSA provenance statement on the tarball.
      #
      # Skip-if-published gate prevents the job from failing when a tag
      # bumps one package but leaves another at its current version.

      - name: Publish hq-cloud (dependency of hq-cli)
        run: |
          NAME=$(jq -r .name packages/hq-cloud/package.json)
          VER=$(jq -r .version packages/hq-cloud/package.json)
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping"
          else
            npm publish --workspace packages/hq-cloud --access public --provenance
          fi

      - name: Publish hq-cli
        run: |
          NAME=$(jq -r .name packages/hq-cli/package.json)
          VER=$(jq -r .version packages/hq-cli/package.json)
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping"
          else
            npm publish --workspace packages/hq-cli --access public --provenance
          fi

      - name: Publish create-hq
        run: |
          NAME=$(jq -r .name packages/create-hq/package.json)
          VER=$(jq -r .version packages/create-hq/package.json)
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping"
          else
            npm publish --workspace packages/create-hq --access public --provenance
          fi
