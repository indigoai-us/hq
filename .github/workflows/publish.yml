name: Publish to npm
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Build in dependency order: hq-cloud and hq-onboarding first (hq-cli
      # imports from both). npm workspaces does not topo-sort `--workspaces`,
      # so we stage the build explicitly.
      - run: npm run build --workspace packages/hq-cloud --if-present
      - run: npm run build --workspace packages/hq-onboarding --if-present
      - run: npm run build --workspaces --if-present

      # Publish only if the workspace version hasn't been published yet.
      # Prevents the job from failing when a tag bumps one package but
      # leaves another at its current version.
      - name: Publish hq-cloud (dependency of hq-cli)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(jq -r .name packages/hq-cloud/package.json)
          VER=$(jq -r .version packages/hq-cloud/package.json)
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping"
          else
            npm publish --workspace packages/hq-cloud --access public
          fi

      # Publish hq-cli via npm trusted publishing (OIDC). No NODE_AUTH_TOKEN —
      # auth is short-lived, minted from GitHub OIDC token, and scoped to this
      # workflow file by npm's trusted-publisher config for @indigoai-us/hq-cli.
      - name: Publish hq-cli
        run: |
          NAME=$(jq -r .name packages/hq-cli/package.json)
          VER=$(jq -r .version packages/hq-cli/package.json)
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping"
          else
            npm publish --workspace packages/hq-cli --access public --provenance
          fi

      - name: Publish create-hq
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(jq -r .name packages/create-hq/package.json)
          VER=$(jq -r .version packages/create-hq/package.json)
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping"
          else
            npm publish --workspace packages/create-hq --access public
          fi
