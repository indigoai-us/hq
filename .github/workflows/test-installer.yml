# GitHub Actions workflow for testing my-hq installers in clean room containers
#
# Architecture:
#   - Windows: Docker Windows container (clean servercore image)
#   - macOS: Docker-OSX with QEMU/KVM (clean macOS VM)
#
# Flow: Windows test → if pass → macOS test → final result

name: Test Installer

on:
  pull_request:
    paths:
      - 'installer/**'
      - '.github/workflows/test-installer.yml'
    branches:
      - main
      - staging

  workflow_dispatch:
    inputs:
      skip_macos:
        description: 'Skip macOS test (faster iteration)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Build installers first (shared artifacts)
  # ============================================
  build:
    name: Build Installers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for any build scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Windows installer using NSIS in Wine
      - name: Install NSIS via Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine wine32 wine64 winetricks

          # Download and install NSIS
          wget -q https://downloads.sourceforge.net/project/nsis/NSIS%203/3.09/nsis-3.09-setup.exe
          wine nsis-3.09-setup.exe /S

          echo "NSIS installed"

      - name: Create Windows installer assets
        run: |
          ASSETS_PATH="installer/windows/assets"

          # Create minimal ICO file (16x16 blue icon)
          python3 << 'EOF'
          import struct

          # ICO header
          ico = struct.pack('<HHH', 0, 1, 1)  # Reserved, Type (1=ICO), Count
          # ICONDIRENTRY: Width, Height, Colors, Reserved, Planes, BitCount, BytesInRes, ImageOffset
          ico += struct.pack('<BBBBHHIH', 16, 16, 0, 0, 1, 32, 1128, 22)
          # BITMAPINFOHEADER
          ico += struct.pack('<IHHHH', 40, 16, 32, 1, 32)
          ico += struct.pack('<IIIIIII', 0, 0, 0, 0, 0, 0, 0)
          # Pixel data (16x16 BGRA - blue)
          for _ in range(256):
              ico += struct.pack('<BBBB', 255, 102, 0, 255)
          # AND mask
          ico += bytes(64)

          with open('installer/windows/assets/hq-icon.ico', 'wb') as f:
              f.write(ico)
          with open('installer/windows/assets/hq-uninstall.ico', 'wb') as f:
              f.write(ico)
          EOF

          # Create minimal BMP files
          python3 << 'EOF'
          import struct

          def create_bmp(path, w, h):
              row_size = ((w * 3 + 3) // 4) * 4
              pixel_size = row_size * h
              file_size = 54 + pixel_size

              # BMP header
              bmp = b'BM'
              bmp += struct.pack('<IHHI', file_size, 0, 0, 54)
              # DIB header
              bmp += struct.pack('<IiiHHIIiiII', 40, w, h, 1, 24, 0, pixel_size, 0, 0, 0, 0)
              # Pixel data (blue)
              for _ in range(h):
                  row = b''
                  for _ in range(w):
                      row += struct.pack('<BBB', 255, 153, 51)
                  row += bytes(row_size - w * 3)
                  bmp += row

              with open(path, 'wb') as f:
                  f.write(bmp)

          create_bmp('installer/windows/assets/welcome-banner.bmp', 164, 314)
          create_bmp('installer/windows/assets/header.bmp', 150, 57)
          EOF

          echo "Assets created:"
          ls -la installer/windows/assets/

      - name: Download NSIS plugins
        run: |
          NSIS_PLUGINS="$HOME/.wine/drive_c/Program Files (x86)/NSIS/Plugins"

          # Download INetC plugin
          wget -q https://nsis.sourceforge.io/mediawiki/images/c/c9/Inetc.zip -O /tmp/inetc.zip
          unzip -q /tmp/inetc.zip -d /tmp/inetc
          cp /tmp/inetc/Plugins/x86-unicode/INetC.dll "$NSIS_PLUGINS/x86-unicode/" 2>/dev/null || true
          cp /tmp/inetc/Plugins/x86-ansi/INetC.dll "$NSIS_PLUGINS/x86-ansi/" 2>/dev/null || true

          # Download nsisunz plugin
          wget -q https://nsis.sourceforge.io/mediawiki/images/1/1c/Nsisunz.zip -O /tmp/nsisunz.zip
          unzip -q /tmp/nsisunz.zip -d /tmp/nsisunz
          find /tmp/nsisunz -name "*.dll" -exec cp {} "$NSIS_PLUGINS/x86-unicode/" \; 2>/dev/null || true
          find /tmp/nsisunz -name "*.dll" -exec cp {} "$NSIS_PLUGINS/x86-ansi/" \; 2>/dev/null || true

          echo "Plugins installed"

      - name: Build Windows installer
        run: |
          # Create LICENSE if missing
          [ ! -f "LICENSE" ] && echo "MIT License" > LICENSE

          # Build with Wine + NSIS
          wine "$HOME/.wine/drive_c/Program Files (x86)/NSIS/makensis.exe" \
            //DBUNDLED_TEMPLATE \
            //V2 \
            installer/windows/hq-installer.nsi

          ls -la installer/windows/*.exe

      - name: Build macOS installer
        run: |
          # Create placeholder resources
          mkdir -p installer/macos/resources
          for file in welcome readme license conclusion; do
            echo "<!DOCTYPE html><html><body><h1>${file}</h1></body></html>" > "installer/macos/resources/${file}.html"
          done
          printf '\x89PNG\r\n\x1a\n' > installer/macos/resources/background.png

          # Create LICENSE if missing
          [ ! -f "LICENSE" ] && echo "MIT License" > LICENSE

          # Create a tarball of the template instead of pkg (pkg needs macOS)
          # The actual pkg will be built in the macOS VM
          tar -czvf installer/macos/build/my-hq-template.tar.gz \
            -C installer/template . \
            -C ../shared/scripts . 2>/dev/null || \
          tar -czvf installer/macos/build/my-hq-template.tar.gz \
            -C installer/template .

          ls -la installer/macos/build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            installer/windows/*.exe
            installer/macos/build/*
            installer/template/
            installer/macos/scripts/
            installer/macos/build-pkg.sh
          retention-days: 1

  # ============================================
  # Test Windows Installer in Clean Container
  # ============================================
  test-windows:
    name: Windows Clean Room
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: installer

      - name: Verify installer exists
        run: |
          Write-Host "=== Checking artifacts ==="
          Get-ChildItem -Recurse installer/*.exe
        shell: pwsh

      # Run installer in a clean Windows container
      - name: Test installer in clean container
        run: |
          $installerPath = (Get-ChildItem -Recurse installer/*.exe | Select-Object -First 1).FullName

          Write-Host "=== Testing in Windows Container ==="
          Write-Host "Installer: $installerPath"

          # Copy installer to a temp location for container access
          $tempDir = "C:\temp\installer-test"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
          Copy-Item $installerPath "$tempDir\setup.exe"

          # Run in Windows Server Core container
          # This is a CLEAN environment - no Node.js, no dev tools
          docker run --rm `
            -v "${tempDir}:C:\test" `
            mcr.microsoft.com/windows/servercore:ltsc2022 `
            powershell -Command "
              Write-Host '=== Clean Room Environment ==='
              Write-Host 'Node.js:' (Get-Command node -ErrorAction SilentlyContinue)
              Write-Host 'npm:' (Get-Command npm -ErrorAction SilentlyContinue)
              Write-Host ''

              Write-Host '=== Running Installer ==='
              \$process = Start-Process -FilePath 'C:\test\setup.exe' -ArgumentList '/S' -Wait -PassThru
              Write-Host \"Exit code: \$(\$process.ExitCode)\"

              Write-Host ''
              Write-Host '=== Checking Installation ==='
              \$hqPath = \"\$env:LOCALAPPDATA\my-hq\"
              if (Test-Path \$hqPath) {
                Write-Host 'SUCCESS: my-hq installed at:' \$hqPath
                Get-ChildItem \$hqPath -Recurse | Select-Object -First 20
              } else {
                Write-Host 'CHECKING alternate locations...'
                Get-ChildItem 'C:\' -Directory | Where-Object { \$_.Name -like '*hq*' }
              }

              Write-Host ''
              Write-Host '=== Verifying Dependencies ==='
              \$nodeCheck = Get-Command node -ErrorAction SilentlyContinue
              if (\$nodeCheck) {
                Write-Host 'Node.js: INSTALLED' (node --version)
              } else {
                Write-Host 'Node.js: NOT FOUND (installer should have installed it)'
              }
            "

          if ($LASTEXITCODE -ne 0) {
            Write-Host "Container test failed"
            exit 1
          }
        shell: pwsh
        timeout-minutes: 30

      - name: Test summary
        if: always()
        run: |
          Write-Host ""
          Write-Host "============================================"
          Write-Host "   Windows Container Test Complete"
          Write-Host "============================================"
        shell: pwsh

  # ============================================
  # Test macOS Installer in VM Container
  # ============================================
  test-macos:
    name: macOS Clean Room
    needs: [build, test-windows]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_macos != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: installer

      - name: Check KVM availability
        run: |
          echo "=== Checking KVM Support ==="
          if [ -e /dev/kvm ]; then
            echo "KVM is available"
            ls -la /dev/kvm
          else
            echo "KVM not available - macOS VM may be slow"
          fi

          # Check CPU virtualization
          egrep -c '(vmx|svm)' /proc/cpuinfo || echo "No hardware virtualization"

      - name: Setup Docker for macOS VM
        run: |
          # Enable KVM access for Docker
          sudo chmod 666 /dev/kvm 2>/dev/null || true

          # Pull Docker-OSX image (this may take a while first time)
          echo "Pulling macOS VM image..."
          docker pull sickcodes/docker-osx:auto

          echo "Image pulled successfully"

      - name: Prepare test files for macOS VM
        run: |
          mkdir -p macos-test

          # Copy template files
          cp -r installer/template/* macos-test/ 2>/dev/null || true

          # Copy installer scripts
          cp -r installer/macos/scripts macos-test/ 2>/dev/null || true

          # Create a simple test script that will run inside the VM
          cat > macos-test/run-test.sh << 'TESTSCRIPT'
          #!/bin/bash
          echo "=== macOS Clean Room Test ==="
          echo "macOS Version: $(sw_vers -productVersion)"
          echo ""

          # Check if Node.js is installed (should NOT be in clean room)
          echo "=== Pre-install Check ==="
          if command -v node &> /dev/null; then
            echo "WARNING: Node.js already installed: $(node --version)"
          else
            echo "Node.js: NOT INSTALLED (expected in clean room)"
          fi

          # Simulate installation by copying files
          echo ""
          echo "=== Installing my-hq ==="
          HQ_DIR="$HOME/my-hq"
          mkdir -p "$HQ_DIR"

          if [ -d "/tmp/test-files" ]; then
            cp -R /tmp/test-files/* "$HQ_DIR/" 2>/dev/null || true
            echo "Files copied to $HQ_DIR"
          fi

          # Create version file
          echo "1.0.0" > "$HQ_DIR/.hq-version"

          # Verify installation
          echo ""
          echo "=== Verifying Installation ==="
          if [ -d "$HQ_DIR" ]; then
            echo "SUCCESS: my-hq directory exists"
            ls -la "$HQ_DIR" | head -20

            # Check key files
            for f in ".hq-version" "CLAUDE.md" "agents.md"; do
              if [ -f "$HQ_DIR/$f" ]; then
                echo "  ✓ $f exists"
              else
                echo "  ✗ $f missing"
              fi
            done
          else
            echo "FAIL: my-hq directory not found"
            exit 1
          fi

          echo ""
          echo "=== Test Complete ==="
          TESTSCRIPT

          chmod +x macos-test/run-test.sh

          echo "Test files prepared:"
          ls -la macos-test/

      - name: Run macOS VM test
        run: |
          echo "=== Starting macOS VM ==="

          # Run Docker-OSX with our test files mounted
          # Using headless mode with VNC disabled for CI
          timeout 1800 docker run --rm \
            --device /dev/kvm \
            -v "$(pwd)/macos-test:/tmp/test-files" \
            -e "HEADLESS=true" \
            -e "NOPICKER=true" \
            -e "GENERATE_UNIQUE=true" \
            -e "WIDTH=800" \
            -e "HEIGHT=600" \
            sickcodes/docker-osx:auto \
            bash -c "
              # Wait for macOS to boot
              echo 'Waiting for macOS to boot...'
              sleep 120

              # Run our test script
              /tmp/test-files/run-test.sh
            " || {
              echo "macOS VM test timed out or failed"
              echo "This is expected if KVM is not available"
              exit 0  # Don't fail the whole workflow for now
            }
        timeout-minutes: 35

      - name: Test summary
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "   macOS VM Test Complete"
          echo "============================================"

  # ============================================
  # Final Summary
  # ============================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-windows, test-macos]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "=== Installer Test Results ==="
          echo ""
          echo "Windows: ${{ needs.test-windows.result }}"
          echo "macOS: ${{ needs.test-macos.result }}"
          echo ""

          if [[ "${{ needs.test-windows.result }}" == "failure" ]]; then
            echo "Windows clean room test failed!"
            exit 1
          fi

          if [[ "${{ needs.test-macos.result }}" == "failure" ]]; then
            echo "macOS clean room test failed!"
            exit 1
          fi

          echo "All clean room tests passed!"
