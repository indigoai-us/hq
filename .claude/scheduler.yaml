# Global Scheduler Configuration
# Controls how the autonomous scheduler dispatches agents across all companies.
#
# Per-company settings (scheduler.enabled, scheduler.max_agents) live in
# companies/manifest.yaml under each company entry. The total concurrent
# agent count is the sum of all enabled companies' max_agents values.

# Hours (24h format, UTC) during which the scheduler must NOT dispatch agents.
# Useful for avoiding noisy overnight runs or aligning with working hours.
blocked_hours:
  - 2    # 2 AM UTC
  - 3    # 3 AM UTC
  - 4    # 4 AM UTC

# Hour (24h format, UTC) at which the scheduler runs the daily digest.
# The scheduler checks this on each cron tick and generates the digest once per day.
digest_hour: 23   # 11 PM UTC
