id: enhancement
name: "Enhancement"
description: "Incremental improvements by chaining code-reviewer and qa for safe, quality-gated changes"
type: composition

depends_on:
  - skill: code-reviewer
    when: always
  - skill: qa
    when: always

context:
  base:
    - .claude/skills/enhancement/
  dynamic: []
  exclude: []

instructions: |
  # Enhancement

  Composition skill for incremental improvements to existing code.

  This skill does not execute work directly. It declares dependencies
  that /execute-task resolves into an ordered execution chain.

  Use this skill when the change is small and scoped — no new architecture
  required, no schema changes, just improving something that already exists.

  ## Execution Order

  1. **code-reviewer** — review the proposed change or existing diff
  2. **qa** — validate the change with targeted tests

  ## Handoff Protocol

  ```json
  {
    "from_skill": "code-reviewer",
    "to_skill": "qa",
    "summary": "what was reviewed and approved",
    "files_changed": [],
    "decisions": [],
    "back_pressure": { "tests": "pass", "types": "pass" }
  }
  ```

  ## When to Use

  - Bug fixes that don't require architecture changes
  - Refactoring existing code without changing behavior
  - Performance improvements to existing endpoints or components
  - Adding missing tests or improving coverage
  - Small UX improvements to existing UI
