# Skills Registry
# Index of all skills in .claude/skills/
# Kept in sync with actual skill directories.
# /cleanup --reindex validates this file against the filesystem.

skills:
  # --- Execution Skills ---

  - id: architect
    path: .claude/skills/architect/
    type: execution
    description: "System design, API design, and architecture decisions"

  - id: backend
    path: .claude/skills/backend/
    type: execution
    description: "API endpoints, business logic, and server-side integrations"

  - id: frontend
    path: .claude/skills/frontend/
    type: execution
    description: "React/Next.js components, pages, and client-side logic"

  - id: database
    path: .claude/skills/database/
    type: execution
    description: "Schema design, migrations, and query optimization"

  - id: code-reviewer
    path: .claude/skills/code-reviewer/
    type: execution
    description: "Code review, quality gating, and merge management"

  - id: qa
    path: .claude/skills/qa/
    type: execution
    description: "Testing, validation, and accessibility verification"

  - id: video-gen
    path: .claude/skills/video-gen/
    type: execution
    description: "Video production: script to voiceover, Remotion render, and ffmpeg post-processing"

  # --- Composition Skills ---

  - id: full-stack
    path: .claude/skills/full-stack/
    type: composition
    description: "End-to-end feature delivery by chaining architect, backend, frontend, and review skills"

  - id: enhancement
    path: .claude/skills/enhancement/
    type: composition
    description: "Incremental improvements by chaining code-reviewer and qa for safe, quality-gated changes"

  # --- Templates ---
  # _template/ is not a skill — it is the schema reference for new skills.
