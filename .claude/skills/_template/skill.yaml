# Skill Template
# Copy this file to .claude/skills/{skill-id}/skill.yaml
# Then register the skill in .claude/skills/registry.yaml

# --- Required fields ---

id: my-skill                     # Unique identifier, matches directory name
name: "My Skill"                 # Human-readable display name
description: "What this skill does in one sentence"

# Skill types:
#   execution   - Does work directly (writes code, reviews, designs)
#   composition - Chains other skills via depends_on (e.g. full-stack)
#   library     - Shared utilities loaded by other skills (not executable)
type: execution

# --- Dependencies (optional) ---

# Skills this skill depends on. /execute-task resolves the chain.
# Simple form:
#   depends_on:
#     - architect
#     - code-reviewer
#
# Conditional form (skill only included when condition matches):
#   depends_on:
#     - skill: database
#       when: "task involves schema changes"
#     - skill: architect
#       when: always
#
# Omit entirely for standalone skills.
depends_on: []

# --- Context loading (optional) ---

context:
  # Files/dirs always loaded when this skill activates
  base:
    - .claude/skills/my-skill/

  # Files loaded conditionally based on task context
  # Pattern supports {repo} placeholder resolved at runtime
  dynamic:
    - pattern: "{repo}/src/"
      when: always

  # Patterns to never load (saves context)
  exclude:
    - node_modules/
    - dist/
    - "*.log"
    - ".git/"

# --- Instructions ---
# The skill's prompt — loaded into the agent's context when the skill activates.
# Keep concise. Link to knowledge/ files for lengthy reference material.

instructions: |
  # My Skill

  What this skill does and how it approaches tasks.

  ## Responsibilities

  1. First responsibility
  2. Second responsibility

  ## Rules

  - Rule one
  - Rule two

  ## Output

  - What this skill produces
