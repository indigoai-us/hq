  # ── Brand Packs ──────────────────────────────────────────────────────────────
  # Company-specific packs that extend a style pack with brand overrides.

  - id: moonflow-editorial-v2
    name: Moonflow Editorial V2
    version: "1.0.0"
    type: brand
    status: active
    scope: company
    company: moonflow
    extends: editorial-magazine
    path: packs/moonflow-editorial-v2/
    aesthetic: "Warm terracotta editorial — earthy sunset palette, Fraunces serif display + Inter body, soft cream surfaces, luminous moon-phase photography."

  - id: hpo-brand
    name: HPO Brand
    version: "1.0.0"
