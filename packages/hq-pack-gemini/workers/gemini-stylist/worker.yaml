worker:
  id: gemini-stylist
  name: "Gemini Stylist"
  description: "CSS and animation specialist via Google Gemini CLI — animations, responsive polish, dark mode, CSS refactoring"
  type: CodeWorker
  version: "1.0"

execution:
  mode: on_demand
  max_runtime: 20m
  retry_attempts: 2
  spawn_method: task_tool
  model: sonnet

context:
  base:
    - workers/public/gemini-stylist/skills/
    - knowledge/public/gemini-cli/
    - knowledge/public/design-styles/styles/
    - knowledge/public/design-styles/packs/
    - knowledge/public/design-styles/resources/
    - knowledge/public/design-quality/
  dynamic:
    - pattern: "{target_repo}/src/components/"
      when: always
    - pattern: "{target_repo}/src/styles/"
      when: exists
    - pattern: "{target_repo}/tailwind.config.*"
      when: exists
    - pattern: "{target_repo}/design.md"
      when: exists
    - pattern: "{target_repo}/GEMINI.md"
      when: exists
  exclude:
    - node_modules/
    - dist/
    - .next/
    - "*.log"
    - api/
    - server/

skills:
  - id: add-animation
    file: skills/add-animation.md
  - id: responsive-polish
    file: skills/responsive-polish.md
  - id: dark-mode
    file: skills/dark-mode.md
  - id: css-refactor
    file: skills/css-refactor.md

verification:
  post_execute:
    - check: typescript
      command: npm run typecheck
    - check: lint
      command: npm run lint
  approval_required: true
  human_checkpoints:
    - before_animation_changes
    - before_css_refactor

cli:
  binary: gemini
  install: npm install -g @google/gemini-cli
  env:
    - GEMINI_API_KEY
  commands:
    - gemini -p "{prompt}" --model pro --approval-mode yolo --output-format text
    - cat {files} | gemini -p "{prompt}" --model pro --approval-mode yolo --output-format text
    - cat {files} | gemini -p "{prompt}" --model flash --sandbox --output-format text

state_machine:
  enabled: true
  max_retries: 2
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

reporting:
  on_complete:
    - log_generation
    - extract_learnings
  metrics:
    - animations_added
    - responsive_fixes
    - css_improvements
    - back_pressure_pass_rate

instructions: |
  # Gemini Stylist — CSS & Animation Specialist

  CSS generation, animation, responsive polish, and styling refactors via Google Gemini CLI.
  Uses Gemini's strong CSS/animation generation for second-model perspective on styling.

  ## Prerequisites

  - Gemini CLI installed: `npm install -g @google/gemini-cli`
  - Auth: `GEMINI_API_KEY` env var (from `settings/gemini/credentials.env`)

  ## When to Use

  - **add-animation**: Add purposeful animations (Framer Motion, CSS keyframes, GSAP)
  - **responsive-polish**: Fix responsive issues across breakpoints
  - **dark-mode**: Add or fix dark mode support
  - **css-refactor**: Refactor CSS for modern patterns and reduced duplication

  Use gemini-stylist when:
  - Adding animations or transitions to existing components
  - Fixing responsive breakpoint issues
  - Implementing dark mode across a component set
  - Modernizing CSS (container queries, :has(), oklch)
  - Second-model perspective on styling decisions

  Do NOT use gemini-stylist when:
  - Building new components from scratch (use gemini-frontend)
  - Design system analysis (use gemini-designer)
  - UX flow critique (use gemini-ux-auditor)
  - Cinematic visual design (use frontend-designer)

  ## Skills

  | Skill | Model | Description |
  |-------|-------|-------------|
  | add-animation | pro | Add purposeful animations. Framer Motion, CSS keyframes, GSAP |
  | responsive-polish | flash | Fix responsive issues: 320px → 1440px |
  | dark-mode | flash | Add/fix dark mode: CSS vars, Tailwind dark:, color-scheme |
  | css-refactor | pro | Reduce duplication, modern CSS, improve specificity |

  ## CLI Usage

  ```bash
  /run gemini-stylist add-animation --file src/components/Hero.tsx --type entrance --cwd repos/private/app
  /run gemini-stylist responsive-polish --scope src/components/ --cwd repos/private/{product}
  /run gemini-stylist dark-mode --scope src/components/ --cwd repos/private/app
  /run gemini-stylist css-refactor --file src/styles/globals.css --cwd repos/private/{product}
  ```

  ## Design Standards

  - Animations: `opacity` + `transform` only (compositor thread, no layout thrashing)
  - `prefers-reduced-motion` support mandatory on all animations
  - OKLCH color space preferred over HSL
  - clamp() for fluid sizing
  - WCAG AA contrast minimum
  - Touch targets minimum 44px on mobile
