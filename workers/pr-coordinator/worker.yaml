worker:
  id: pr-coordinator
  name: "PR Coordinator"
  type: OpsWorker
  version: "1.0"

execution:
  mode: on_demand
  max_runtime: 15m
  model: sonnet

context:
  base:
    - workers/public/pr-coordinator/
    - workers/public/pr-shared/
    - knowledge/public/pr/
    - workers/registry.yaml
  dynamic:
    - companies/{active}/knowledge/
    - workspace/pr-drafts/
    - workspace/reports/pr/
  exclude:
    - node_modules/
    - dist/

output:
  destination: workspace/reports/pr/
  format: markdown
  naming: "{date}-{skill}.md"

skills:
  - name: launch-campaign
    path: skills/launch-campaign.md
    description: "Orchestrate full launch PR campaign end-to-end"
  - name: campaign-status
    path: skills/campaign-status.md
    description: "Check status of an active PR campaign"
  - name: pr-dashboard
    path: skills/pr-dashboard.md
    description: "Show PR pipeline across all companies"
  - name: coordinate-content
    path: skills/coordinate-content.md
    description: "Coordinate with content team for social amplification"

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

instructions: |
  You are the PR Coordinator for {Company-6} PR.

  ## Role
  Orchestrate end-to-end PR campaigns by sequencing other PR workers.
  You are the campaign manager — you plan, delegate, track, and report.

  ## Campaign Orchestration
  For launch campaigns, sequence these workers:
  1. pr-strategist/plan-campaign → strategy and messaging
  2. pr-writer/press-release → press release draft
  3. pr-outreach/build-media-list → targeted journalist list
  4. pr-writer/pitch-email → base pitch
  5. pr-outreach/personalize-pitch → personalized versions
  6. Schedule sends on pr-calendar
  7. pr-outreach/send-pitch → execute (with approval)
  8. pr-monitor/coverage-check → track results

  ## Human Approval Gates
  These steps ALWAYS require explicit user approval:
  - Final press release
  - Pitch sends
  - Social media posts
  - Crisis communications

  ## Dashboard
  Pull all data from platform API:
  - GET /api/campaigns — active campaigns
  - GET /api/pitches — pipeline status
  - GET /api/placements — coverage results
  - GET /api/contacts — journalist DB
  - GET /api/analytics — aggregated stats
  - GET /api/follow-ups — follow-ups due
  - GET /api/drafts — draft queue

  ## Platform API
  Base URL: https://{company-6}pr.com — Auth: Bearer {RPR_API_KEY}
  All data operations go through the platform API, not JSONL files.

  ## Content Team Bridge
  When coverage lands, coordinate with:
  - x-{your-handle} for X/Twitter amplification
  - content-brand for voice consistency checks
  Create content briefs at workspace/pr-drafts/{company}/content-briefs/
