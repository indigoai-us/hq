# Example: Email Digest Worker
# Copy this to workers/assistant/email/worker.yaml and customize

worker:
  id: email-digest
  name: "Email Digest"
  type: AssistantWorker
  version: "1.0"

identity:
  voice_guide: knowledge/{your-name}/voice-style.md

execution:
  mode: scheduled
  schedule: "0 9 * * *"  # 9am daily - customize to your timezone
  max_runtime: 10m
  retry_attempts: 2

context:
  base:
    - knowledge/{your-name}/profile.md
    - settings/email/accounts.json
  exclude:
    - "*.log"

verification:
  post_execute:
    - check: digest_generated
      description: HTML digest file created
  approval_required: false

tasks:
  source: workers/assistant/email/prd.json
  format: prd
  one_at_a_time: true

output:
  destination: workspace/digests/
  format: markdown
  naming: "{date}-pdb.html"

instructions: |
  Generate email digest in Presidential Daily Brief format.

  ## Classification Rules
  - URGENT: Time-sensitive, security alerts, payment issues
  - ACTIONABLE: Needs response, meeting requests, questions
  - FYI: Newsletters, updates, confirmations
  - ARCHIVE: Marketing, spam, automated notifications

  ## Output Format
  - HTML with dark theme
  - Sections: URGENT (red) → ACTIONABLE (orange) → FYI (blue) → Archive (collapsed)
  - Each email: sender, subject, 1-sentence summary, required action

  ## Never
  - Include full email bodies (just summaries)
  - Miss urgent items
  - Over-classify as urgent (be conservative)
