# Example: X/Twitter Content Worker
# Copy this to workers/social/x-{name}/worker.yaml and customize

worker:
  id: x-personal
  name: "X Content"
  type: SocialWorker
  version: "1.0"

identity:
  voice_guide: knowledge/{your-name}/voice-style.md

execution:
  mode: on-demand  # Or scheduled for regular posting
  # schedule: "0 9,14,19 * * *"  # 9am, 2pm, 7pm
  max_runtime: 15m
  retry_attempts: 2

context:
  base:
    - knowledge/{your-name}/profile.md
    - knowledge/{your-name}/voice-style.md
  dynamic:
    - workspace/content-ideas/
    - social-content/drafts/x/
  exclude:
    - "*.log"
    - "posted/"

verification:
  post_execute:
    - check: character_count
      max: 280
      description: Post must be under 280 characters
    - check: voice_consistency
      description: Content matches voice style guide
  approval_required: true  # Always review before posting

tasks:
  source: workers/social/x-personal/queue.json
  format: simple
  one_at_a_time: true

output:
  destination: social-content/drafts/x/
  format: markdown
  naming: "{date}-{slug}.md"

instructions: |
  Draft X/Twitter content matching voice style guide.

  ## Content Types
  - One-liner: < 280 chars, punchy hook
  - Short post: < 280 chars, slightly expanded
  - Thread: Multiple connected posts
  - Article: Long-form (1500-3000 words)

  ## Voice Guidelines
  - Match tone from voice-style.md
  - No hedging or corporate jargon
  - Be direct and confident
  - Minimal emojis (unless voice guide says otherwise)

  ## Verification
  - Always check character count
  - Read draft aloud - does it sound like you?
  - Would you actually post this?

  ## Never
  - Post without human approval
  - Exceed character limits
  - Use generic/corporate language
  - Include sensitive information
