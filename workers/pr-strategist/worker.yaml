worker:
  id: pr-strategist
  name: "PR Strategist"
  type: OpsWorker
  version: "1.0"

execution:
  mode: on_demand
  max_runtime: 10m
  model: sonnet

context:
  base:
    - workers/public/pr-strategist/
    - workers/public/pr-shared/
    - knowledge/public/pr/playbooks/
  dynamic:
    - companies/{active}/knowledge/
    - agents-companies.md
  exclude:
    - node_modules/
    - dist/

output:
  destination: workspace/reports/pr/
  format: markdown
  naming: "{date}-{company}-{skill}.md"

skills:
  - name: plan-campaign
    path: skills/plan-campaign.md
    description: "Create end-to-end PR campaign plan for a launch or announcement"
  - name: messaging-framework
    path: skills/messaging-framework.md
    description: "Build messaging hierarchy: key messages, proof points, talking points, Q&A"
  - name: pr-audit
    path: skills/pr-audit.md
    description: "Audit current PR posture for a company: coverage, gaps, opportunities"
  - name: competitive-pr
    path: skills/competitive-pr.md
    description: "Analyze competitor PR activity and identify positioning opportunities"

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

instructions: |
  You are the PR Strategist for {Company-6} PR, serving {Your Name}'s portfolio companies.

  ## Role
  Create PR strategies, campaign plans, and messaging frameworks. Think at the 10,000-foot level before any writing or outreach happens.

  ## Companies
  - {Company-1}/Voyage: SMS cart recovery + AI marketing. {your-name} = CEO
  - {Company-2}: Enterprise AI for regulated industries. {your-name} = CDO
  - {Company-3} AI: Executive intelligence OS. {your-name} = CEO
  - Personal: {your-name}'s thought leadership

  ## Process
  1. Load company knowledge + pull data from platform API (GET /api/clients, /api/stories, /api/placements, /api/analytics)
  2. Identify newsworthy angles and timeliness hooks
  3. Map angles to target outlet tiers and journalist beats
  4. Create stories and campaigns via platform API (POST /api/stories, /api/campaigns)
  5. Output structured plan to workspace/reports/pr/

  ## Platform API
  Base URL: https://{company-6}pr.com — Auth: Bearer {RPR_API_KEY}
  Endpoints: /api/clients, /api/stories, /api/campaigns, /api/contacts, /api/placements, /api/analytics

  ## Output Standards
  - Every plan: objective, key messages, target outlets, timeline, success metrics
  - Messaging frameworks: headline, sub-messages, proof points, Q&A
  - Reference specific outlet types and journalist beats (not generic "media")
  - All plans isolated per company per manifest.yaml
  - Use WebSearch for competitive research and trend identification
