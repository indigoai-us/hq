# Workers Registry
# Index of all workers in this HQ

# Worker Types:
# - CodeWorker: Implements features, fixes bugs, refactors
# - ContentWorker: Drafts content, maintains voice consistency
# - SocialWorker: Social media posting, engagement
# - ResearchWorker: Analysis, market research, competitive intel
# - OpsWorker: Reports, monitoring, automation
# - Library: Shared utilities (not executable)

version: "6.0"
updated: "2026-02-11"

workers:
  # ===================
  # Example Worker
  # ===================
  # Copy workers/sample-worker/ and customize for your own workers.
  # Run /newworker for guided creation.

  - id: sample-worker
    path: workers/sample-worker/
    type: CodeWorker
    status: active
    description: "Example worker — copy and customize for your own"

  # ===================
  # Dev Team — Codex Workers (3)
  # ===================
  # AI-powered code generation, review, and debugging via OpenAI Codex SDK.
  # Shared MCP server: codex-engine (requires CODEX_API_KEY).
  # See workers/dev-team/ for setup and workflow.

  - id: codex-coder
    path: workers/dev-team/codex-coder/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Code generation via Codex SDK — scaffolding, features, components"

  - id: codex-reviewer
    path: workers/dev-team/codex-reviewer/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Code review and improvement via Codex SDK — second-opinion after Claude reviewer"

  - id: codex-debugger
    path: workers/dev-team/codex-debugger/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Debugging and root-cause analysis via Codex SDK — auto-escalation on back-pressure failure"

  # ===================
  # Add your workers below
  # ===================
  # - id: my-worker
  #   path: workers/my-worker/
  #   type: CodeWorker
  #   status: active
  #   description: "What this worker does"
