# Workers Registry
# Index of all workers in this HQ

version: "2.0"
updated: "2026-01-25"

# Worker Types:
# - CodeWorker: Implements features, fixes bugs, refactors
# - ContentWorker: Drafts content, maintains voice consistency
# - SocialWorker: Social media posting, engagement
# - ResearchWorker: Analysis, market research, competitive intel
# - OpsWorker: Reports, monitoring, automation
# - Library: Shared utilities (not executable)

workers:
  # ===================
  # Dev Team (13 workers)
  # ===================
  # Full development team for autonomous project execution
  # See workers/dev-team/README.md for workflow

  - id: project-manager
    path: workers/dev-team/project-manager/
    type: CodeWorker
    team: dev-team
    status: active
    description: "PRD lifecycle, issue selection, learning aggregation"

  - id: task-executor
    path: workers/dev-team/task-executor/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Analyze issue, route to workers, validate completion"

  - id: architect
    path: workers/dev-team/architect/
    type: CodeWorker
    team: dev-team
    status: active
    description: "System design, API design, architecture decisions"

  - id: backend-dev
    path: workers/dev-team/backend-dev/
    type: CodeWorker
    team: dev-team
    status: active
    description: "API endpoints, business logic, backend implementation"

  - id: database-dev
    path: workers/dev-team/database-dev/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Schema design, migrations, query optimization"

  - id: qa-tester
    path: workers/dev-team/qa-tester/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Testing, browser automation, accessibility"

  - id: frontend-dev
    path: workers/dev-team/frontend-dev/
    type: CodeWorker
    team: dev-team
    status: active
    description: "React/Next components, pages, UI implementation"

  - id: motion-designer
    path: workers/dev-team/motion-designer/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Animations, transitions, visual polish"

  - id: infra-dev
    path: workers/dev-team/infra-dev/
    type: CodeWorker
    team: dev-team
    status: active
    description: "CI/CD pipelines, deployment, monitoring"

  - id: code-reviewer
    path: workers/dev-team/code-reviewer/
    type: CodeWorker
    team: dev-team
    status: active
    description: "PR review, merge management, code quality"

  - id: knowledge-curator
    path: workers/dev-team/knowledge-curator/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Process learnings, update knowledge bases"

  - id: product-planner
    path: workers/dev-team/product-planner/
    type: CodeWorker
    team: dev-team
    status: active
    description: "PRD creation, technical specs, API contracts"

  - id: context-manager
    path: workers/dev-team/context-manager/
    type: CodeWorker
    team: dev-team
    status: active
    description: "Discover, maintain, and audit project context"

  # ===================
  # Content Team (5 workers)
  # ===================
  # Specialized content analysis workers
  # See workers/content-shared/README.md for architecture

  - id: content-brand
    path: workers/content-brand/
    type: ContentWorker
    team: content-team
    status: active
    description: "Brand voice, messaging, tone analysis"

  - id: content-sales
    path: workers/content-sales/
    type: ContentWorker
    team: content-team
    status: active
    description: "Conversion copy, CTAs, value props"

  - id: content-product
    path: workers/content-product/
    type: ContentWorker
    team: content-team
    status: active
    description: "Feature accuracy, technical claims verification"

  - id: content-legal
    path: workers/content-legal/
    type: ContentWorker
    team: content-team
    status: active
    description: "Regulatory compliance, claim verification"

  - id: content-shared
    path: workers/content-shared/
    type: Library
    team: content-team
    status: active
    description: "Shared utilities for content workers"

  # ===================
  # Security & Ops (1 worker)
  # ===================
  # Pre-deployment security scanning

  - id: security-scanner
    path: workers/security-scanner/
    type: OpsWorker
    status: active
    description: "Pre-deploy PII/credential scanning for public repos"

  # ===================
  # Stefan's Workers
  # ===================

  - id: email-digest
    path: workers/assistant/email/
    type: AssistantWorker
    status: active
    description: "Morning email digest - Presidential Daily Brief format"

  - id: x-stefan
    path: workers/social/x-stefan/
    type: SocialWorker
    status: active
    description: "X content drafting - Indigo, AI, experiences, future"

  - id: protofit-coder
    path: workers/code/protofit/
    type: CodeWorker
    status: active
    description: "Ralph loop for protofit project"

