description: >
  Kernel file classification for HQ. Defines which files are locked (cannot be
  edited without bypass), reviewable (editable with warning), or open (unrestricted).
  Checksums are SHA256 of each locked file at time of classification.

rules:
  locked:
    - .claude/CLAUDE.md
    - .claude/settings.json
    - .claude/hooks/
    - modules/
    - companies/manifest.yaml
    - companies/_template/
    - workers/registry.yaml
    - INDEX.md
    - USER-GUIDE.md
    - .ignore
    - scripts/
    - core.yaml

  reviewable:
    - workspace/
    - .claude/commands/
    - .claude/skills/

  open:
    - "**"

