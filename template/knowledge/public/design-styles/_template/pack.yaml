# pack.yaml — Style Pack Manifest
# Replace all <placeholders> before publishing this pack.
# See PACK-SCHEMA.md for full field documentation.
#
# Usage:
#   1. Copy this directory to packs/<your-pack-id>/
#   2. Fill in all <placeholders>
#   3. Fill in the content files (style-guide.md, implementation.md, etc.)
#   4. Add an entry to packs/registry.yaml
#   5. Run: qmd update

# ──────────────────────────────────────────────
# Pack Identity
# ──────────────────────────────────────────────

id: <pack-id>              # kebab-case, unique across registry (e.g., "brutalist-raw", "hpo-editorial")
name: <Pack Display Name>  # human-readable name shown in listings (e.g., "Brutalist Raw", "HPO Editorial")
version: "1.0.0"           # semver — bump minor for non-breaking additions, major for breaking changes

# type: style  — a pure aesthetic system, usable by any brand
# type: brand  — company-specific adaptation; requires the "extends" field below
type: style

# One-line description of the visual language.
# Used in registry listings, worker context headers, and search indexes.
aesthetic: "<one sentence describing the visual language and feeling>"

# Attribution: original designer / studio / source.
# For original packs, write "Original" or describe the inspiration source.
# For brand packs, write the company / brand owner.
origin: "<Designer Name> / <Studio Name> (<url>)"

# ──────────────────────────────────────────────
# Brand Pack Extension (brand packs only)
# ──────────────────────────────────────────────
# Uncomment and fill in if type: brand.
# This must be the "id" of an existing style pack in the registry.

# extends: <style-pack-id>

# ──────────────────────────────────────────────
# Contents Map
# ──────────────────────────────────────────────
# Maps role keys to relative file paths within this pack directory.
# Workers use these keys — never hardcode filenames in worker YAML.
# Add or remove optional entries as needed.

contents:
  style_guide: style-guide.md          # Visual reference — aesthetic principles, color, type, patterns
  implementation: implementation.md    # Code-level system — CSS, tokens, components, motion
  tokens_css: design-tokens.css        # CSS custom properties (:root block)
  tokens_json: design-tokens.json      # DTCG-format tokens for tooling and Figma sync
  design_template: design-template.md  # Drop-in design.md for repos adopting this pack

  # Optional: directory of reference images (swipes, moodboard)
  # swipes: swipes/

# ──────────────────────────────────────────────
# Compatibility
# ──────────────────────────────────────────────
# Declares which formula directories and industry contexts this pack targets.
# Used by the pack browser and worker routing.

compatibility:
  # List formula slugs this pack is designed for.
  # Must match directory names under knowledge/public/design-styles/formulas/
  formulas:
    - web       # web interfaces, marketing sites, SPAs
    # - app     # native/PWA mobile apps
    # - slides  # decks, pitch decks, presentations
    # - social  # social media graphics
    # - print   # print layouts, PDFs

  # Industry/context tags — freeform, but prefer existing tags in registry.
  industries:
    - <industry-1>    # e.g., saas, fintech, consumer, editorial, defense, lifestyle
    - <industry-2>

# ──────────────────────────────────────────────
# Context Paths
# ──────────────────────────────────────────────
# Paths that workers load when this pack is active.
# required = always loaded at session start
# optional = loaded only when task-relevant (design review, token work, etc.)
#
# Paths are relative to THIS pack directory.
# Use full HQ paths for shared foundations (knowledge/public/design-styles/...)

context_paths:
  required:
    - implementation.md       # Code-level system — load for all design/dev tasks
    - design-tokens.css       # CSS custom properties — load for all frontend tasks

  optional:
    - style-guide.md          # Visual reference — load for design review and audit tasks
    - design-tokens.json      # DTCG tokens — load for token tooling, Figma sync tasks
    # - knowledge/public/design-styles/foundations/typography.md
    # - knowledge/public/design-styles/foundations/color.md

# ──────────────────────────────────────────────
# Tools (optional)
# ──────────────────────────────────────────────
# Worker commands this pack exposes.
# Delete this section if the pack has no associated worker.

# tools:
#   audit: "run <worker-name> audit"     # design audit command
#   polish: "run <worker-name> polish"   # polish pass command
#   review: "run <worker-name> review"   # design review command
