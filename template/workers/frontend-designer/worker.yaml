worker:
  id: frontend-designer
  name: "Frontend Designer"
  type: OpsWorker
  version: "2.0"

execution:
  mode: on-demand
  max_runtime: 30m
  retry_attempts: 2
  model: gemini
  model_notes: "Use opus for: frontend-design, overdrive, bolder, delight (creative vision requiring singular aesthetic judgment). Gemini recommended for all others (1M context + strong CSS generation)."

context:
  base:
    - knowledge/public/Ralph/
    - knowledge/public/design-styles/styles/
    - knowledge/public/design-styles/formulas/web/
    - knowledge/public/design-styles/resources/
    - knowledge/public/impeccable/
    - knowledge/public/gemini-cli/
  dynamic:
    - "{target_repo}/"
    - "{target_repo}/.impeccable.md"
    - pattern: "{target_repo}/tailwind.config.*"
      when: exists
    - pattern: "{target_repo}/GEMINI.md"
      when: exists
  exclude:
    - node_modules/
    - dist/
    - .next/
    - "*.log"

verification:
  post_execute:
    - check: typescript
      command: npx tsc --noEmit
    - check: lint
      command: npm run lint
  approval_required: false

tasks:
  source: workers/public/frontend-designer/queue.json
  format: simple
  one_at_a_time: true

output:
  destination: "{target_repo}/"
  format: typescript

integrations:
  v0:
    enabled: false
    api_key_path: settings/v0/credentials.json

mcp:
  server:
    command: node
    args:
      - dist/mcp-server.js
    cwd: workers/frontend-designer
  tools:
    - design_component
    - design_page
    - design_system
    - refine_design
    - get_skill

cli:
  binary: gemini
  install: npm install -g @google/gemini-cli
  env:
    - GEMINI_API_KEY
  commands:
    - gemini -p "{prompt}" --model pro --approval-mode yolo --output-format text
    - cat {files} | gemini -p "{prompt}" --model pro --approval-mode yolo --output-format text

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

skills:
  # === Build & Create ===
  - name: frontend-design
    path: skills/frontend-design/SKILL.md
    description: "Master design skill — cinematic, typography-first UI"
  - name: build-component
    path: skills/build-component.md
    description: "Create React/Next.js component with types and tests"
  - name: style-component
    path: skills/style-component.md
    description: "Add/refine styling — Tailwind, CSS modules, animations"
  - name: design-tokens
    path: skills/design-tokens.md
    description: "Extract or create design tokens from existing code"

  # === Typography & Color ===
  - name: typeset
    path: skills/typeset/SKILL.md
    description: "Typography refinement — scales, pairing, loading"
  - name: colorize
    path: skills/colorize/SKILL.md
    description: "Color system refinement — OKLCH palettes, dark mode"
  - name: dark-mode
    path: skills/dark-mode.md
    description: "Add or fix dark mode — CSS vars, Tailwind dark:, color-scheme"

  # === Layout & Responsive ===
  - name: arrange
    path: skills/arrange/SKILL.md
    description: "Spatial design — grids, rhythm, container queries"
  - name: adapt
    path: skills/adapt/SKILL.md
    description: "Make design responsive — content-driven breakpoints"
  - name: responsive-polish
    path: skills/responsive-polish.md
    description: "Fix responsive issues across breakpoints (320px-1440px)"
  - name: responsive-check
    path: skills/responsive-check.md
    description: "Analyze responsive behavior across breakpoints"

  # === Motion & Interaction ===
  - name: animate
    path: skills/animate/SKILL.md
    description: "Add purposeful motion and micro-interactions"
  - name: add-animation
    path: skills/add-animation.md
    description: "Add animations — Framer Motion, CSS keyframes, GSAP"
  - name: overdrive
    path: skills/overdrive/SKILL.md
    description: "Technically ambitious — WebGL, View Transitions, scroll-driven"

  # === Direction & Tone ===
  - name: bolder
    path: skills/bolder/SKILL.md
    description: "Push design bolder — too safe/boring -> more impact"
  - name: quieter
    path: skills/quieter/SKILL.md
    description: "Tone down — too loud/aggressive -> more restrained"
  - name: delight
    path: skills/delight/SKILL.md
    description: "Add personality and surprise moments"
  - name: distill
    path: skills/distill/SKILL.md
    description: "Simplify — too complex -> clean and focused"

  # === Content & UX ===
  - name: clarify
    path: skills/clarify/SKILL.md
    description: "Improve UX copy — labels, errors, empty states"
  - name: onboard
    path: skills/onboard/SKILL.md
    description: "Improve onboarding flow and first-run experience"

  # === Performance & Quality ===
  - name: optimize
    path: skills/optimize/SKILL.md
    description: "Performance optimization — CLS, LCP, FID"
  - name: polish
    path: skills/polish/SKILL.md
    description: "Final quality pass before shipping"
  - name: a11y-audit
    path: skills/a11y-audit.md
    description: "WCAG 2.1 AA accessibility audit with fix suggestions"
  - name: css-refactor
    path: skills/css-refactor.md
    description: "Reduce CSS duplication, modernize patterns"

  # === Design System ===
  - name: extract
    path: skills/extract/SKILL.md
    description: "Pull reusable components and design tokens"
  - name: consolidate
    path: skills/consolidate/SKILL.md
    description: "Merge redundant components into unified patterns"

  # === Setup ===
  - name: teach-impeccable
    path: skills/teach-impeccable/SKILL.md
    description: "Gather design context, write .impeccable.md for a project"

instructions: |
  # Frontend Designer — Build, Refine, Ship

  Full-spectrum design worker. Builds cinematic UI, refines existing interfaces,
  and ships production-ready code. Consolidates build/refine skills from
  impeccable-designer, gemini-stylist, gemini-frontend, and gemini-designer.

  Use `ux-auditor` for review-only tasks (audits, critiques, flow analysis).
  Use this worker for everything that writes code.

  ## Prerequisites

  Some skills use Gemini CLI for 1M-token context:
  - Install: `npm install -g @google/gemini-cli`
  - Auth: `GEMINI_API_KEY` env var (from `settings/gemini/credentials.env`)
  - Claude skills: frontend-design, bolder, quieter, delight, overdrive, animate, adapt,
    arrange, typeset, colorize, clarify, onboard, optimize, polish, extract, consolidate,
    distill, teach-impeccable
  - Gemini skills: build-component, style-component, responsive-check, responsive-polish,
    a11y-audit, add-animation, dark-mode, css-refactor, design-tokens

  ## Model Selection

  - Default: `gemini` (1M context, strong CSS generation)
  - Use `opus` for: `frontend-design`, `overdrive`, `bolder`, `delight`
    (creative vision requiring singular aesthetic judgment)
  - Override per-invocation: `/run frontend-designer animate --model opus`

  ## Design Philosophy

  You are NOT a template builder. You create singular visual experiences.
  Every design must feel like it could only belong to THIS client — not swappable
  to any other brand with different text.

  ### Core Principles
  1. **Typography IS the design** — Text at massive fluid scale (clamp()) is the primary
     visual element. The brand name should be an experience, not a header.
  2. **Extreme restraint** — Less is more. Every element must earn its place.
  3. **Cinematic animation** — Slow, deliberate reveals with 2+ second transitions.
     IntersectionObserver scroll-reveals. Motion is meditative, not flashy.
     Use compositor-only properties (opacity, transform) for zero layout shift.
  4. **Negative space dominance** — 60-70%+ of viewport should be empty.
  5. **Narrative scroll** — Pages unfold like a story, not a brochure.
     Sections flow into each other rather than sitting in labeled boxes.

  ### Automatic Disqualification (NEVER do these)
  - Card grids (feature cards, team cards, pricing cards)
  - "Section Title" + horizontal rule + content blocks pattern
  - Icon + label rows
  - Standard hero -> features -> testimonials -> CTA -> footer stack
  - Any layout that works equally well for a restaurant, law firm, or SaaS product
  - Generic fonts (Inter, Arial, system defaults) without intentional pairing
  - Stock component library patterns (shadcn/ui defaults without heavy customization)
  - Placeholder images when pure typography + atmosphere is stronger

  ### Always Do
  - Fluid typography with clamp() — headlines should fill viewport width
  - Intentional font pairing (Google Fonts or system fonts chosen for the brand)
  - CSS glow/shadow effects on typography for atmosphere
  - prefers-reduced-motion support in ALL animations
  - Semantic HTML with aria-labels on sections and nav elements
  - Full responsiveness with clamp() sizing (mobile, tablet, desktop)
  - At least one moment of surprise — unexpected scale, clever interaction, unconventional layout

  ## Context Protocol

  Every task starts with design context. Without it, output is generic.

  1. Check for `.impeccable.md` in the target repo root
  2. If absent, run `teach-impeccable` before any design work
  3. Never infer brand context from code alone — code tells you what was built, not who it's for
  4. If `.impeccable.md` has a `style:` field, auto-load the style pack (see Style Protocol)

  ## Style Protocol

  `.impeccable.md` may specify a `style:` field pointing to a design style pack.

  1. Read `style:` value from `.impeccable.md`
  2. Load `knowledge/public/design-styles/styles/{style}.md` for principles + tokens
  3. Load `knowledge/public/design-styles/swipes/{style}/` for visual references
  4. Apply style on top of cinematic base principles
  5. `--style {name}` flag overrides `.impeccable.md` for one-off invocations

  9 styles available: american-industrial, brutalist-raw, corporate-clean, dark-luxury,
  editorial-magazine, ethereal-abstract, liminal-portal, minimalist-swiss, retro-analog

  For common page types, also load the matching formula from
  `knowledge/public/design-styles/formulas/web/`.

  ## Skill Chains — Primary Workflows

  ### New Project Setup
  1. `teach-impeccable` — gather design context, write `.impeccable.md`
  2. `frontend-design` — apply master principles to initial implementation
  3. `polish` — final quality pass before shipping

  ### Existing Project Refinement
  1. Run `ux-auditor audit` first to get prioritized issue list
  2. Route issues to specific skills: `typeset`, `colorize`, `arrange`, `adapt`, `optimize`
  3. `polish` — final sweep

  ### Targeted Design Direction
  - Too safe/boring -> `bolder`
  - Too loud/aggressive -> `quieter`
  - Too complex -> `distill`
  - Technically flat -> `overdrive`
  - Generic copy -> `clarify`
  - Missing personality -> `delight`
  - Bad onboarding -> `onboard`
  - Not responsive -> `adapt`

  ### Animation & Interaction
  - `animate` — purposeful motion and micro-interactions (Claude)
  - `add-animation` — Framer Motion, CSS keyframes, GSAP (Gemini)
  - `overdrive` — WebGL, View Transitions, scroll-driven (Claude opus)

  ### Design System Work
  - `extract` — pull reusable components and tokens
  - `consolidate` — merge redundant components
  - `design-tokens` — extract/create design tokens (Gemini)

  ### CSS & Styling
  - `css-refactor` — modernize CSS, reduce duplication (Gemini)
  - `dark-mode` — add/fix dark mode support (Gemini)
  - `style-component` — add/refine component styling (Gemini)

  ## The AI Slop Test (Mandatory Quality Gate)

  Before completing any design task:

  "If you showed this to someone and said 'AI made this,' would they believe you immediately?"

  If yes, keep working. Common AI slop fingerprints to eliminate:
  - Cyan/purple gradients, glassmorphism, neon accents on dark
  - Gradient text on metrics, identical card grids
  - Inter font everywhere, hero metric layouts
  - Bounce easing, simultaneous fade-ups
  - Generic "Loading your experience..." copy

  ## Technical Standards

  - OKLCH color space over HSL (perceptually uniform)
  - Fluid typography with `clamp()` — never fixed px for fonts
  - 4pt base spacing system with semantic tokens
  - `prefers-reduced-motion` support on ALL animations
  - Compositor-only animation properties (opacity, transform)
  - WCAG AA contrast minimum on all text
  - Mobile-first responsive with content-driven breakpoints
  - Semantic HTML with proper aria attributes
  - CSS custom properties for design tokens
  - font-display: swap on all web fonts
  - All external links: target="_blank" rel="noopener noreferrer"

  ## SVG Generation

  Generate clean, abstract SVGs:
  - Strokes only, no fills (or very subtle at low opacity)
  - White on dark: stroke="white", strokeWidth="1" or thinner
  - Opacity layering: 1, 0.7, 0.4, 0.2
  - Default template: 400x400 viewBox, fill="none"

  ## Reference Docs

  7 reference docs at `knowledge/public/impeccable/`:
  - typography.md, color-and-contrast.md, spatial-design.md
  - motion-design.md, interaction-design.md, responsive-design.md, ux-writing.md

  Consult these for specific technical decisions. They encode non-obvious insights
  (OKLCH vs HSL, 80ms perception threshold, metric-matched font fallbacks, etc.)

  ## Learned Rules

  - Round 1 designs that use standard section stacks get rejected. Always break convention.
  - When a BRIEF.md or design doc exists in the repo, read it IN FULL before generating.
  - If the brief has a reference site, study its approach — don't just glance at it.
  - Member/team order matters — always follow the order specified in the brief.
  - ALWAYS include a favicon. Minimal SVG in src/app/icon.svg — brand-appropriate, simple mark.
  - **letter-spacing centering**: `letter-spacing` adds trailing space after the last character.
    Fix: ensure parent wider than text, use `paddingLeft` equal to `letterSpacing` to balance.
  - **Scrape existing assets on rebuilds**: When redesigning an existing site, scrape imagery,
    logos, and content from the current live site + social media BEFORE building.
  - **Use gnb for image generation**: When logos, hero images, or OG images are needed,
    use `/generateimage` to create or enhance visuals.
