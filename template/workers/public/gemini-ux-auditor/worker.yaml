worker:
  id: gemini-ux-auditor
  name: "Gemini UX Auditor"
  description: "UX and usability audit via Google Gemini CLI — heuristic evaluation, flow review, copy review, competitive analysis"
  type: CodeWorker
  version: "1.0"

execution:
  mode: on_demand
  max_runtime: 15m
  retry_attempts: 1
  spawn_method: task_tool
  model: sonnet

context:
  base:
    - workers/public/gemini-ux-auditor/skills/
    - knowledge/public/gemini-cli/
    - knowledge/public/impeccable/ux-writing.md
    - knowledge/public/impeccable/interaction-design.md
    - knowledge/public/impeccable/responsive-design.md
    - knowledge/public/impeccable/typography.md
    - knowledge/public/impeccable/color-and-contrast.md
    - knowledge/public/impeccable/spatial-design.md
    - knowledge/public/impeccable/motion-design.md
  dynamic:
    - pattern: "{target_repo}/src/app/"
      when: always
    - pattern: "{target_repo}/src/components/"
      when: always
    - pattern: "{target_repo}/src/pages/"
      when: exists
    - pattern: "{target_repo}/GEMINI.md"
      when: exists
  exclude:
    - node_modules/
    - dist/
    - .next/
    - "*.log"
    - api/
    - server/

skills:
  - id: ux-audit
    file: skills/ux-audit.md
  - id: flow-review
    file: skills/flow-review.md
  - id: copy-review
    file: skills/copy-review.md
  - id: competitive-scan
    file: skills/competitive-scan.md

verification:
  post_execute: []
  approval_required: false

cli:
  binary: gemini
  install: npm install -g @google/gemini-cli
  env:
    - GEMINI_API_KEY
  commands:
    - cat {files} | gemini -p "{prompt}" --model flash --sandbox --output-format text

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

reporting:
  on_complete:
    - log_generation
    - extract_learnings
  metrics:
    - ux_issues_found
    - flow_friction_points
    - copy_improvements
    - back_pressure_pass_rate

instructions: |
  # Gemini UX Auditor — UX & Usability Specialist

  UX analysis and usability evaluation via Google Gemini CLI.
  Leverages Gemini's 1M context to load entire page trees and user flows
  for holistic UX analysis without hitting context limits.

  ## Prerequisites

  - Gemini CLI installed: `npm install -g @google/gemini-cli`
  - Auth: `GEMINI_API_KEY` env var (from `settings/gemini/credentials.env`)

  ## When to Use

  - **ux-audit**: Heuristic evaluation, cognitive load, interaction cost analysis
  - **flow-review**: User flow analysis for friction and drop-off risk
  - **copy-review**: Microcopy, error messages, empty states, CTA clarity
  - **competitive-scan**: Compare UX patterns against industry standards

  Use gemini-ux-auditor when:
  - Full page/flow analysis benefits from seeing all components at once
  - UX critique needs second-model perspective
  - Evaluating copy, error messaging, or empty states
  - Benchmarking against industry patterns

  Do NOT use gemini-ux-auditor when:
  - Building UI components (use gemini-frontend)
  - CSS/animation work (use gemini-stylist)
  - Design system analysis (use gemini-designer)
  - Visual design direction (use frontend-designer)

  ## Skills

  | Skill | Description |
  |-------|-------------|
  | ux-audit | Heuristic evaluation: Nielsen's 10, cognitive load, interaction cost |
  | flow-review | User flow friction analysis: signup, checkout, onboarding |
  | copy-review | Microcopy quality: error messages, empty states, CTAs |
  | competitive-scan | Compare UX against industry standards |

  ## CLI Usage

  ```bash
  /run gemini-ux-auditor ux-audit --cwd repos/private/{product}
  /run gemini-ux-auditor flow-review --flow signup --cwd repos/private/app
  /run gemini-ux-auditor copy-review --scope src/components/ --cwd repos/private/{product}
  /run gemini-ux-auditor competitive-scan --product "cart recovery SMS" --cwd repos/private/{product}
  ```

  ## All Skills Are Read-Only

  This worker NEVER writes files. All skills use `--sandbox` mode.
  Output is structured reports only.
