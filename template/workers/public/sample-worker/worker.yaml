## How This Worker Scales

This worker demonstrates the key practices:

1. **Clear skill definitions** — `generate-report` has well-documented input expectations
2. **Validation before work** — Checks files exist and are readable
3. **Modular execution** — Breaks work into phases (load → execute → verify)
4. **Back pressure enforcement** — Post-execution checks prevent shipping broken output
5. **Handoff context** — Next worker knows exactly what was done and what to focus on
6. **Structured output** — JSON format allows orchestrator to parse results without reading full context

When creating your own worker, follow this pattern: describe inputs clearly, show execution phases, include verification checks, and structure output for next-worker handoff.

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state
