## Worked Example: Complete Skill Execution Walkthrough

This section demonstrates what successful skill execution looks like from input to output.

### Scenario
An orchestrator needs to execute the `generate-report` skill on a Node.js project analytics task.

### Input (from orchestrator)

```json
{
  "task_id": "analytics-001",
  "task_title": "Generate Q1 Performance Report",
  "task_description": "Analyze quarterly metrics and produce a summary report",
  "skill": "generate-report",
  "skill_params": {
    "data_source": "workspace/data/q1-metrics.json",
    "report_format": "markdown",
    "include_charts": true,
    "output_path": "workspace/reports/q1-performance.md"
  },
  "cwd": "~/Documents/HQ",
  "files_context": [
    "workspace/data/q1-metrics.json",
    "knowledge/public/analytics/reporting-style.md"
  ]
}
```

### Processing (What the worker does)

#### Phase 1: Load Input & Validate
```
✓ Task loaded: analytics-001
✓ Skill verified: generate-report exists
✓ Parameters validated: data_source readable, output_path writable
✓ Context files loaded: 2 files, 45KB total
```

#### Phase 2: Execute generate-report Skill
```bash
# Step 1: Load and parse input data
$ node -e "const data = require('./workspace/data/q1-metrics.json');
  console.log('Loaded:', data.period, '—', data.metrics.length, 'metrics')"
Loaded: Q1-2026 — 24 metrics

# Step 2: Load reporting style guide
$ cat knowledge/public/analytics/reporting-style.md | head -20
# Analytics Reporting Style Guide
- Use clear section headers
- Include "Key Findings" callout box
- Format numbers with thousand separators
- Use markdown h2/h3 hierarchy

# Step 3: Generate report using loaded style
$ generate-report \
  --data workspace/data/q1-metrics.json \
  --format markdown \
  --style knowledge/public/analytics/reporting-style.md \
  --output workspace/reports/q1-performance.md
[INFO] Generating report...
[INFO] Parsing metrics...
[INFO] Applying style guide...
[INFO] Rendering output...
✓ Report written: 2847 bytes
```

#### Phase 3: Post-Execution Verification
```bash
# Back pressure check: verify output exists and has content
$ test -f workspace/reports/q1-performance.md && wc -l workspace/reports/q1-performance.md
42 workspace/reports/q1-performance.md

# Lint/format check
$ markdownlint workspace/reports/q1-performance.md
✓ No formatting issues

# Content validation
$ grep -c "^## " workspace/reports/q1-performance.md
5 sections found ✓
```

### Output (Worker returns)

```json
{
  "summary": "Generated Q1 performance report with 24 metrics analyzed, 5-section markdown output with charts",
  "files_created": [
    "workspace/reports/q1-performance.md"
  ],
  "files_modified": [],
  "key_decisions": [
    "Used markdown format with embedded chart metadata for later rendering",
    "Organized by business unit to show regional performance variance",
    "Added trend analysis comparing Q4-2025 to Q1-2026 growth rates"
  ],
  "context_for_next": "Report contains month-by-month breakdown. Next reviewer should verify Q1 definitions match fiscal calendar.",
  "back_pressure": {
    "tests": "pass",
    "lint": "pass",
    "typecheck": "skipped",
    "build": "skipped"
  },
  "issues": []
}
```

### Next Worker Receives

The output becomes the context for the next phase (e.g., a reviewer):

```
## Context from Previous Phase

Worker: sample-worker (generate-report skill)
Status: success

Key outputs:
- Created: workspace/reports/q1-performance.md (42 lines, 2847 bytes)
- Decisions: Organized by business unit for regional variance analysis
- Focus for review: Month-by-month breakdown accuracy vs fiscal calendar

Your job: Validate report content, check numbers, verify chart metadata
```

