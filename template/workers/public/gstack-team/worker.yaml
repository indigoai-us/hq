worker:
  id: gstack-team
  name: "Gstack Team"
  type: OpsWorker
  version: "1.0"

execution:
  mode: on_demand
  max_runtime: 60m
  retry_attempts: 1
  model: opus

context:
  base:
    - workers/public/gstack-team/
    - ~/.claude/skills/gstack/bin/
  exclude:
    - node_modules/
    - dist/
    - "*.log"

output:
  destination: workspace/reports/gstack/
  format: markdown
  naming: "{date}-{skill}.md"

# Skills moved here from .claude/skills/ during the HQ core-cleanup audit.
# All g-* skills hard-depend on the `gstack` CLI at ~/.claude/skills/gstack/bin/
# (user-global install — install once per machine via gstack's own installer).
skills:
  - name: g-autoplan
    path: skills/g-autoplan/SKILL.md
    description: "Autoplan a gstack task into structured steps"
  - name: g-benchmark
    path: skills/g-benchmark/SKILL.md
    description: "Benchmark current change against baseline"
  - name: g-canary
    path: skills/g-canary/SKILL.md
    description: "Canary deploy gated rollout"
  - name: g-careful
    path: skills/g-careful/SKILL.md
    description: "Extra-caution mode for risky changes"
  - name: g-codex
    path: skills/g-codex/SKILL.md
    description: "Delegate coding to Codex CLI"
  - name: g-cso
    path: skills/g-cso/SKILL.md
    description: "Chief Security Officer review pass"
  - name: g-design-consultation
    path: skills/g-design-consultation/SKILL.md
    description: "Design consultation session"
  - name: g-design-review
    path: skills/g-design-review/SKILL.md
    description: "Design review pass"
  - name: g-document-release
    path: skills/g-document-release/SKILL.md
    description: "Document a gstack release"
  - name: g-freeze
    path: skills/g-freeze/SKILL.md
    description: "Freeze current state (no new work)"
  - name: g-gstack-upgrade
    path: skills/g-gstack-upgrade/SKILL.md
    description: "Upgrade gstack itself"
  - name: g-guard
    path: skills/g-guard/SKILL.md
    description: "Guardrail enforcement for risky ops"
  - name: g-investigate
    path: skills/g-investigate/SKILL.md
    description: "Iron Law investigation within gstack context"
  - name: g-land-and-deploy
    path: skills/g-land-and-deploy/SKILL.md
    description: "Land PR and deploy to production"
  - name: g-office-hours
    path: skills/g-office-hours/SKILL.md
    description: "Office hours / ad-hoc Q&A mode"
  - name: g-plan-ceo-review
    path: skills/g-plan-ceo-review/SKILL.md
    description: "CEO-level plan review"
  - name: g-plan-design-review
    path: skills/g-plan-design-review/SKILL.md
    description: "Design-focused plan review"
  - name: g-plan-eng-review
    path: skills/g-plan-eng-review/SKILL.md
    description: "Engineering plan review"
  - name: g-qa
    path: skills/g-qa/SKILL.md
    description: "Full QA pass (tests + manual)"
  - name: g-qa-only
    path: skills/g-qa-only/SKILL.md
    description: "QA-only pass (skip code changes)"
  - name: g-retro
    path: skills/g-retro/SKILL.md
    description: "Gstack retrospective"
  - name: g-review
    path: skills/g-review/SKILL.md
    description: "Paranoid pre-landing review"
  - name: g-setup-browser-cookies
    path: skills/g-setup-browser-cookies/SKILL.md
    description: "Setup browser cookies for gstack automation"
  - name: g-setup-deploy
    path: skills/g-setup-deploy/SKILL.md
    description: "Setup deploy pipeline for a new repo"
  - name: g-ship
    path: skills/g-ship/SKILL.md
    description: "Ship a gstack feature end-to-end"
  - name: g-unfreeze
    path: skills/g-unfreeze/SKILL.md
    description: "Unfreeze after g-freeze"

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

instructions: |
  # Gstack Team

  Wraps the `gstack` CLI (installed user-global at `~/.claude/skills/gstack/bin/`)
  as an HQ worker. All g-* skills are thin dispatchers to gstack subcommands plus
  HQ-side glue (state, policy, checkpoints).

  ## Prerequisites
  - `gstack` binary installed at `~/.claude/skills/gstack/bin/gstack-*`
  - Shell PATH must include that directory (gstack's installer handles this)

  ## Scope
  Originally built for {company}'s engineering flow but intentionally company-agnostic:
  any HQ user who installs gstack can invoke these skills. Each skill's SKILL.md
  handles argument parsing and delegates to the matching gstack binary.

  ## Invocation
  `/run gstack-team {skill}` — e.g. `/run gstack-team g-ship` or `/run gstack-team g-review`.

  ## Sub-worker
  `workers/public/gstack-team/gstack-sprint/` — sprint-scoped gstack wrapper (separate worker.yaml).

  ## Cross-reference
  Moved here from `.claude/skills/g-*` during HQ v6.0.0 core-cleanup audit.
