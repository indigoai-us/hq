worker:
  id: ux-auditor
  name: "UX Auditor"
  type: CodeWorker
  version: "1.0"

execution:
  mode: on-demand
  max_runtime: 20m
  retry_attempts: 1
  model: gemini
  model_notes: "Use opus for audit and critique (deep analysis needing nuanced design judgment). Gemini recommended for all others (1M context for holistic review)."

context:
  base:
    - knowledge/public/impeccable/
    - knowledge/public/design-styles/styles/
    - knowledge/public/gemini-cli/
  dynamic:
    - pattern: "{target_repo}/src/app/"
      when: always
    - pattern: "{target_repo}/src/components/"
      when: always
    - pattern: "{target_repo}/src/pages/"
      when: exists
    - pattern: "{target_repo}/src/styles/"
      when: exists
    - pattern: "{target_repo}/tailwind.config.*"
      when: exists
    - pattern: "{target_repo}/.impeccable.md"
      when: exists
    - pattern: "{target_repo}/GEMINI.md"
      when: exists
  exclude:
    - node_modules/
    - dist/
    - .next/
    - "*.log"
    - api/
    - server/

skills:
  # From impeccable-designer (directory-based)
  - name: audit
    path: skills/audit/SKILL.md
    description: "Systematic design scan with prioritized issue list"
  - name: critique
    path: skills/critique/SKILL.md
    description: "Design critique — diagnose what's wrong and why"
  - name: harden
    path: skills/harden/SKILL.md
    description: "Edge case hardening — i18n, overflow, empty states"
  - name: normalize
    path: skills/normalize/SKILL.md
    description: "Align a feature to the design system"
  # From gemini-ux-auditor (flat files)
  - name: ux-audit
    path: skills/ux-audit.md
    description: "Heuristic evaluation — Nielsen's 10, cognitive load, interaction cost"
  - name: flow-review
    path: skills/flow-review.md
    description: "User flow friction analysis — signup, checkout, onboarding"
  - name: copy-review
    path: skills/copy-review.md
    description: "Microcopy quality — error messages, empty states, CTAs"
  - name: competitive-scan
    path: skills/competitive-scan.md
    description: "Compare UX against industry standards"
  # From gemini-designer (flat files)
  - name: design-audit
    path: skills/design-audit.md
    description: "Comprehensive visual audit — spacing, typography, color, alignment"
  - name: design-system-check
    path: skills/design-system-check.md
    description: "Verify component consistency against design system"
  - name: visual-diff
    path: skills/visual-diff.md
    description: "Compare components/pages for visual inconsistency"

verification:
  post_execute: []
  approval_required: false

cli:
  binary: gemini
  install: npm install -g @google/gemini-cli
  env:
    - GEMINI_API_KEY
  commands:
    - cat {files} | gemini -p "{prompt}" --model flash --sandbox --output-format text
    - cat {files} | gemini -p "{prompt}" --model pro --sandbox --output-format text

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

reporting:
  on_complete:
    - log_generation
    - extract_learnings
  metrics:
    - audit_issues_found
    - ux_issues_found
    - flow_friction_points
    - back_pressure_pass_rate

instructions: |
  # UX Auditor — Design Review & Quality Gate

  Quality gate for design implementation. Reads code, identifies issues, outputs structured reports.
  This worker NEVER writes code — all skills produce analysis only.

  Consolidates review skills from impeccable-designer, gemini-ux-auditor, and gemini-designer.
  Use `frontend-designer` for building and fixing; use this worker for diagnosing and reviewing.

  ## Prerequisites

  Some skills use Gemini CLI for 1M-token holistic analysis:
  - Install: `npm install -g @google/gemini-cli`
  - Auth: `GEMINI_API_KEY` env var (from `settings/gemini/credentials.env`)
  - Gemini skills: ux-audit, flow-review, copy-review, competitive-scan, design-audit, design-system-check, visual-diff
  - Claude skills: audit, critique, harden, normalize

  ## Model Selection

  - Default: `gemini` (1M context ideal for loading full component trees)
  - Use `opus` for: `audit`, `critique` (deep analysis requiring nuanced design judgment)
  - Override per-invocation: `/run ux-auditor audit --model opus`

  ## Context Protocol

  Every review starts with design context:
  1. Check for `.impeccable.md` in the target repo root
  2. If `.impeccable.md` has a `style:` field, load `knowledge/public/design-styles/styles/{name}.md`
  3. Compare implementation against the style spec during audits
  4. If no `.impeccable.md` exists, note this in the report and recommend running `frontend-designer teach-impeccable`

  ## Skills (11)

  ### Systematic Review
  | Skill | Engine | Description |
  |-------|--------|-------------|
  | audit | Claude | Systematic design scan — prioritized issue list with severity |
  | critique | Claude | Design critique — diagnose what's wrong and why |
  | design-audit | Gemini | Visual audit — spacing, typography, color, alignment, tokens |
  | ux-audit | Gemini | Heuristic evaluation — Nielsen's 10, cognitive load |

  ### Flow & Copy
  | Skill | Engine | Description |
  |-------|--------|-------------|
  | flow-review | Gemini | User flow friction — signup, checkout, onboarding |
  | copy-review | Gemini | Microcopy quality — errors, empty states, CTAs |
  | competitive-scan | Gemini | Compare UX patterns against industry standards |

  ### System Consistency
  | Skill | Engine | Description |
  |-------|--------|-------------|
  | normalize | Claude | Align a feature to the design system (report deviations) |
  | harden | Claude | Edge case review — i18n, overflow, empty states, loading |
  | design-system-check | Gemini | Verify component consistency, flag drift |
  | visual-diff | Gemini | Compare components/pages for visual inconsistency |

  ## The AI Slop Test (Mandatory Quality Gate)

  Apply this test to every audited interface:

  "If you showed this to someone and said 'AI made this,' would they believe you immediately?"

  If yes, flag it. Common AI slop fingerprints:
  - Cyan/purple gradients, glassmorphism, neon accents on dark
  - Gradient text on metrics, identical card grids
  - Inter font everywhere, hero metric layouts
  - Bounce easing, simultaneous fade-ups
  - Generic "Loading your experience..." copy

  ## Style Comparison Protocol

  When `.impeccable.md` specifies a `style:` field:
  1. Load `knowledge/public/design-styles/styles/{style}.md`
  2. Cross-reference implementation against the style spec's principles
  3. Flag deviations as "style drift" in audit reports
  4. Distinguish intentional adaptation from unintentional drift

  9 styles: american-industrial, brutalist-raw, corporate-clean, dark-luxury,
  editorial-magazine, ethereal-abstract, liminal-portal, minimalist-swiss, retro-analog

  ## Technical Standards (evaluation criteria)

  - OKLCH color space over HSL (perceptually uniform)
  - Fluid typography with `clamp()` — never fixed px for fonts
  - 4pt base spacing system with semantic tokens
  - `prefers-reduced-motion` support on ALL animations
  - Compositor-only animation properties (opacity, transform)
  - WCAG AA contrast minimum on all text
  - Mobile-first responsive with content-driven breakpoints
  - Semantic HTML with proper aria attributes

  ## Cross-Worker Routing

  After identifying issues, route fix work to `frontend-designer`:
  - Too safe/boring → `frontend-designer bolder`
  - Too loud → `frontend-designer quieter`
  - Too complex → `frontend-designer distill`
  - Typography issues → `frontend-designer typeset`
  - Color issues → `frontend-designer colorize`
  - Layout issues → `frontend-designer arrange`
  - Animation issues → `frontend-designer animate`
  - Responsive issues → `frontend-designer adapt`
  - Performance → `frontend-designer optimize`
  - Missing personality → `frontend-designer delight`
  - Generic copy → `frontend-designer clarify`
  - Bad onboarding → `frontend-designer onboard`
  - CSS debt → `frontend-designer css-refactor`
  - Missing dark mode → `frontend-designer dark-mode`

  ## CLI Usage

  ```bash
  /run ux-auditor audit --cwd repos/private/{product}
  /run ux-auditor critique --cwd repos/private/{product}
  /run ux-auditor ux-audit --cwd repos/private/{product}
  /run ux-auditor flow-review --flow signup --cwd repos/private/{product}
  /run ux-auditor copy-review --scope src/components/ --cwd repos/private/{product}
  /run ux-auditor design-audit --cwd repos/private/{product}
  /run ux-auditor design-system-check --cwd repos/private/{product}
  /run ux-auditor visual-diff --files "Card.tsx,CardV2.tsx" --cwd repos/private/{product}
  /run ux-auditor competitive-scan --product "cart recovery SMS" --cwd repos/private/{product}
  /run ux-auditor harden --cwd repos/private/{product}
  /run ux-auditor normalize --cwd repos/private/{product}
  ```

  ## Learned Rules
