worker:
  id: gemini-designer
  name: "Gemini Designer"
  description: "Design system analysis and visual audit via Google Gemini CLI — design tokens, consistency checks, visual diffs, holistic audits"
  type: CodeWorker
  version: "1.0"

execution:
  mode: on_demand
  max_runtime: 20m
  retry_attempts: 1
  spawn_method: task_tool
  model: sonnet

context:
  base:
    - workers/public/gemini-designer/skills/
    - knowledge/public/gemini-cli/
    - knowledge/public/design-styles/styles/
    - knowledge/public/design-styles/formulas/web/
    - knowledge/public/design-styles/resources/
    - knowledge/public/impeccable/
  dynamic:
    - pattern: "{target_repo}/src/components/"
      when: always
    - pattern: "{target_repo}/src/styles/"
      when: exists
    - pattern: "{target_repo}/tailwind.config.*"
      when: exists
    - pattern: "{target_repo}/.impeccable.md"
      when: exists
    - pattern: "{target_repo}/GEMINI.md"
      when: exists
  exclude:
    - node_modules/
    - dist/
    - .next/
    - "*.log"
    - api/
    - server/

skills:
  - id: design-audit
    file: skills/design-audit.md
  - id: design-tokens
    file: skills/design-tokens.md
  - id: design-system-check
    file: skills/design-system-check.md
  - id: visual-diff
    file: skills/visual-diff.md

verification:
  post_execute: []
  approval_required: false

cli:
  binary: gemini
  install: npm install -g @google/gemini-cli
  env:
    - GEMINI_API_KEY
  commands:
    - gemini -p "{prompt}" --model pro --sandbox --output-format text
    - cat {files} | gemini -p "{prompt}" --model pro --sandbox --output-format text

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

reporting:
  on_complete:
    - log_generation
    - extract_learnings
  metrics:
    - audit_issues_found
    - tokens_extracted
    - consistency_score
    - back_pressure_pass_rate

instructions: |
  # Gemini Designer — Design System & Visual Audit

  Design system analysis and visual audit using Google Gemini CLI.
  Leverages Gemini's 1M context to load entire component libraries, design tokens,
  and style guides simultaneously for holistic analysis.

  ## Prerequisites

  - Gemini CLI installed: `npm install -g @google/gemini-cli`
  - Auth: `GEMINI_API_KEY` env var (from `settings/gemini/credentials.env`)

  ## When to Use

  - **design-audit**: Comprehensive visual audit of a codebase's UI
  - **design-tokens**: Extract or create design tokens from existing code
  - **design-system-check**: Verify components against the design system
  - **visual-diff**: Compare two components/pages for inconsistency

  Use gemini-designer when:
  - Holistic design analysis needs the full component tree in context
  - Design token extraction requires scanning many files simultaneously
  - Consistency checks benefit from seeing all components at once
  - Second-model perspective on design decisions

  Do NOT use gemini-designer when:
  - Building new components (use gemini-frontend)
  - Writing CSS/animations (use gemini-stylist)
  - UX flow analysis (use gemini-ux-auditor)
  - Cinematic visual design (use frontend-designer)

  ## Skills

  | Skill | Description |
  |-------|-------------|
  | design-audit | Comprehensive visual audit: spacing, typography, color, alignment, token adherence |
  | design-tokens | Extract/create/refine design tokens (CSS vars, Tailwind theme) |
  | design-system-check | Verify component consistency against design system. Flag drift |
  | visual-diff | Compare components/pages for visual inconsistency |

  ## CLI Usage

  ```bash
  /run gemini-designer design-audit --cwd repos/private/{product}
  /run gemini-designer design-tokens --cwd repos/private/app --output tailwind
  /run gemini-designer design-system-check --cwd repos/private/{product}
  /run gemini-designer visual-diff --files "src/components/Card.tsx,src/components/CardV2.tsx" --cwd repos/private/app
  ```

  ## Invocation Patterns

  All skills are read-only (--sandbox). No file writes.

  Audit (loads full component tree):
  ```bash
  cd {cwd} && find src/components -name "*.tsx" | head -50 | xargs cat | GEMINI_API_KEY=$KEY \
    gemini -p "Comprehensive design audit. Evaluate: spacing consistency, typography hierarchy, color palette coherence, alignment, design token adherence. Group by severity (critical/warning/info). Reference specific files and line numbers." \
    --model pro --sandbox --output-format text 2>&1
  ```

  Design tokens (extraction):
  ```bash
  cd {cwd} && cat tailwind.config.* src/styles/*.css src/styles/*.ts 2>/dev/null | GEMINI_API_KEY=$KEY \
    gemini -p "Extract all design tokens. Output as: CSS custom properties, Tailwind theme extension, and a token reference table. Note any inconsistencies or missing tokens." \
    --model pro --sandbox --output-format text 2>&1
  ```

  ## Design Standards (from impeccable/)

  - OKLCH color space, build palettes from neutrals first
  - clamp() for all fluid sizing, 4pt spacing grid
  - Strong typographic hierarchy via weight/size contrast
  - WCAG AA contrast minimum
  - prefers-reduced-motion support mandatory
  - No AI slop: no generic gradients, no cyan/purple/neon
