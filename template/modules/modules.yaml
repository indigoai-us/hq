    access: public
    paths:
      .: knowledge/public/agent-browser

  - name: knowledge-gemini-cli
    repo: local
    branch: main
    strategy: link
    access: public
    paths:
      .: knowledge/public/gemini-cli

  # ─── Private Knowledge Repos ──────────────────────────────────────────

  - name: knowledge-linear
    repo: https://github.com/{your-name}/knowledge-linear.git
    branch: main
    strategy: link
    access: team
    paths:
      .: knowledge/private/linear

