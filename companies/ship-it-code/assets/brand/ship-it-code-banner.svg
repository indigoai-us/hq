<?xml version="1.0" encoding="UTF-8"?>
<svg width="2048" height="1152" viewBox="0 0 2048 1152" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowText" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="2048" height="4">
      <rect width="2048" height="2" fill="#00ff41"/>
    </pattern>
  </defs>

  <!-- Full background -->
  <rect width="2048" height="1152" fill="#080c10"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#00ff41" stroke-width="1">
    <line x1="0" y1="144" x2="2048" y2="144"/>
    <line x1="0" y1="288" x2="2048" y2="288"/>
    <line x1="0" y1="432" x2="2048" y2="432"/>
    <line x1="0" y1="576" x2="2048" y2="576"/>
    <line x1="0" y1="720" x2="2048" y2="720"/>
    <line x1="0" y1="864" x2="2048" y2="864"/>
    <line x1="0" y1="1008" x2="2048" y2="1008"/>
    <line x1="256" y1="0" x2="256" y2="1152"/>
    <line x1="512" y1="0" x2="512" y2="1152"/>
    <line x1="768" y1="0" x2="768" y2="1152"/>
    <line x1="1024" y1="0" x2="1024" y2="1152"/>
    <line x1="1280" y1="0" x2="1280" y2="1152"/>
    <line x1="1536" y1="0" x2="1536" y2="1152"/>
    <line x1="1792" y1="0" x2="1792" y2="1152"/>
  </g>

  <!-- Scanline effect -->
  <g opacity="0.025">
    <rect width="2048" height="1152" fill="url(#scanlines)"/>
  </g>

  <!-- Floating code fragments — left side -->
  <g font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" opacity="0.08" fill="#00ff41">
    <text x="80" y="200" font-size="16">import { deploy } from './cloud';</text>
    <text x="60" y="340" font-size="14">const app = express();</text>
    <text x="100" y="480" font-size="15">async function build() {</text>
    <text x="130" y="510" font-size="15">  await compile();</text>
    <text x="130" y="540" font-size="15">  return ship();</text>
    <text x="100" y="570" font-size="15">}</text>
    <text x="70" y="720" font-size="14">git push origin main</text>
    <text x="90" y="860" font-size="16">npm run deploy</text>
    <text x="50" y="980" font-size="13">✓ 42 tests passed</text>
  </g>

  <!-- Floating code fragments — right side -->
  <g font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" opacity="0.08" fill="#00ff41">
    <text x="1580" y="180" font-size="14">docker build -t app .</text>
    <text x="1620" y="320" font-size="16">export default router;</text>
    <text x="1560" y="460" font-size="15">fn main() -&gt; Result {</text>
    <text x="1590" y="490" font-size="15">  rocket::ignite()</text>
    <text x="1590" y="520" font-size="15">    .launch();</text>
    <text x="1560" y="550" font-size="15">}</text>
    <text x="1600" y="700" font-size="14">kubectl apply -f prod.yaml</text>
    <text x="1640" y="840" font-size="16">CI/CD ✓ passing</text>
    <text x="1570" y="970" font-size="13">deployed to production</text>
  </g>

  <!-- === CENTER CONTENT (fits within 1546x423 safe zone) === -->

  <!-- Rocket — left of center, scaled to fit safe zone -->
  <g filter="url(#glow)" transform="translate(820, 576) scale(0.75)">
    <!-- Rocket shape -->
    <path d="M0,-180 C32,-168 52,-100 52,-25 L52,78 L26,116 L-26,116 L-52,78 L-52,-25 C-52,-100 -32,-168 0,-180Z"
          fill="none" stroke="#00ff41" stroke-width="4.5" stroke-linejoin="round"/>

    <!-- Nose cone highlight -->
    <path d="M0,-180 C18,-168 32,-115 36,-65"
          fill="none" stroke="#00ff4140" stroke-width="3"/>

    <!-- Window -->
    <circle cx="0" cy="-38" r="23" fill="none" stroke="#00ff41" stroke-width="4"/>
    <circle cx="0" cy="-38" r="13" fill="#00ff4120" stroke="#00ff4160" stroke-width="2"/>

    <!-- Code brackets inside window -->
    <text x="-1" y="-30" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace"
          font-size="22" font-weight="bold" fill="#00ff41" opacity="0.9">&lt;/&gt;</text>

    <!-- Fins -->
    <path d="M-52,40 L-84,104 L-52,84Z" fill="none" stroke="#00ff41" stroke-width="4" stroke-linejoin="round"/>
    <path d="M52,40 L84,104 L52,84Z" fill="none" stroke="#00ff41" stroke-width="4" stroke-linejoin="round"/>

    <!-- Body detail lines -->
    <line x1="-38" y1="26" x2="38" y2="26" stroke="#00ff4150" stroke-width="2"/>
    <line x1="-45" y1="65" x2="45" y2="65" stroke="#00ff4150" stroke-width="2"/>

    <!-- Exhaust flames -->
    <g filter="url(#glowStrong)">
      <path d="M-22,116 Q-15,168 0,206 Q15,168 22,116"
            fill="none" stroke="#ff6600" stroke-width="3.5" opacity="0.9"/>
      <path d="M-13,116 Q-6,155 0,186 Q6,155 13,116"
            fill="none" stroke="#ff9900" stroke-width="3" opacity="0.7"/>
      <path d="M-6,116 Q0,142 0,168 Q0,142 6,116"
            fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
    </g>
  </g>

  <!-- Channel name — right of rocket -->
  <g filter="url(#glowText)">
    <text x="1160" y="530" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
          font-size="80" fill="#00ff41" font-weight="bold" letter-spacing="6">SHIP IT</text>
    <text x="1160" y="616" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
          font-size="80" fill="#00ff41" font-weight="bold" letter-spacing="6">CODE</text>
  </g>

  <!-- Tagline -->
  <g filter="url(#glow)">
    <text x="1160" y="672" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
          font-size="20" fill="#00ff41" opacity="0.4" letter-spacing="8">BUILD . DEPLOY . REPEAT</text>
  </g>

  <!-- Terminal prompt at bottom center -->
  <g filter="url(#glow)">
    <text x="1024" y="1060" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace"
          font-size="20" fill="#00ff41" opacity="0.25" letter-spacing="3">$ git push origin main &amp;&amp; echo "shipped" _</text>
  </g>

  <!-- Subtle border -->
  <rect width="2048" height="1152" fill="none" stroke="#00ff4118" stroke-width="2"/>
</svg>
