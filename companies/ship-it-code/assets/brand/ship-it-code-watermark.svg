<?xml version="1.0" encoding="UTF-8"?>
<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rocket — centered, scaled to fill -->
  <g filter="url(#glow)" transform="translate(75, 65)">
    <!-- Rocket shape -->
    <path d="M0,-55 C10,-51 16,-32 16,-7 L16,25 L8,37 L-8,37 L-16,25 L-16,-7 C-16,-32 -10,-51 0,-55Z"
          fill="none" stroke="#00ff41" stroke-width="2" stroke-linejoin="round"/>

    <!-- Window -->
    <circle cx="0" cy="-12" r="7.5" fill="none" stroke="#00ff41" stroke-width="1.8"/>

    <!-- Code brackets inside window -->
    <text x="0" y="-8" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace"
          font-size="9" font-weight="bold" fill="#00ff41" opacity="0.9">&lt;/&gt;</text>

    <!-- Fins -->
    <path d="M-16,13 L-26,34 L-16,27Z" fill="none" stroke="#00ff41" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M16,13 L26,34 L16,27Z" fill="none" stroke="#00ff41" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Body detail lines -->
    <line x1="-12" y1="8" x2="12" y2="8" stroke="#00ff4150" stroke-width="1"/>
    <line x1="-14" y1="20" x2="14" y2="20" stroke="#00ff4150" stroke-width="1"/>

    <!-- Exhaust flames -->
    <g filter="url(#flameGlow)">
      <path d="M-7,37 Q-4.5,53 0,65 Q4.5,53 7,37"
            fill="none" stroke="#ff6600" stroke-width="1.8" opacity="0.9"/>
      <path d="M-4,37 Q-2,49 0,58 Q2,49 4,37"
            fill="none" stroke="#ff9900" stroke-width="1.2" opacity="0.7"/>
      <path d="M-2,37 Q0,46 0,52 Q0,46 2,37"
            fill="none" stroke="#ffcc00" stroke-width="0.8" opacity="0.5"/>
    </g>
  </g>
</svg>
