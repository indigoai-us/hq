# Company Manifest
# Maps each company to its knowledge, settings, skills, and deploy targets.
#
# Company directories live at ~/Documents/GHQ/companies/{slug}/ and are
# symlinked into this repo's companies/ directory.
#
# Isolation rules:
#   - NEVER read credentials from one company for a different company's task
#   - NEVER mix company knowledge in outputs
#   - NEVER deploy to a company's targets from a different company's context
#   - Infer active company from: cwd, skill being run, files being accessed
#
# Schema per entry:
#   symlink:          path to company data (relative to ~/Documents/GHQ/companies/)
#   repos:            list of repo slugs owned by this company
#   settings:         path to company settings directory
#   skills:           list of skill slugs owned by this company
#   knowledge:        path to company knowledge directory
#   deploy:           list of deploy target descriptors
#   vercel_projects:  list of Vercel project identifiers
#   qmd_collections:  list of qmd collection names for search scoping

launch-grid:
  symlink: launch-grid
  repos:
    - ghq
  settings: companies/launch-grid/settings/
  skills: []
  knowledge: companies/launch-grid/knowledge/
  deploy: []
  vercel_projects: []
  qmd_collections:
    - launch-grid

production-house:
  symlink: production-house
  repos: []
  settings: companies/production-house/settings/
  skills:
    - video-gen
  knowledge: companies/production-house/knowledge/
  deploy: []
  vercel_projects: []
  qmd_collections:
    - production-house

indigo:
  symlink: indigo
  repos: []
  settings: companies/indigo/settings/
  skills: []
  knowledge: companies/indigo/knowledge/
  deploy: []
  vercel_projects: []
  qmd_collections:
    - indigo
